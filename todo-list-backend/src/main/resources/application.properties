spring.application.name=todo-list-backend

# 1. Cấu hình thông tin kết nối Database
spring.datasource.url=jdbc:mysql://localhost:3306/TodoList?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Thanhly12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Cấu hình Hibernate (JPA)
# update: Tự động tạo hoặc cập nhật bảng trong DB dựa trên Entity Java
spring.jpa.hibernate.ddl-auto=update

# Hiển thị câu lệnh SQL ra console để tiện debug
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Khai báo loại Database là MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
